version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: devcollab-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devcollab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: devcollab-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: devcollab-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: